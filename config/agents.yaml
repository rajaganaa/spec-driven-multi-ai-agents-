# my-agent-hub — Agent Configuration
# All agents use Google ADK with Gemini models
# Edit model names or instructions here without touching agent code

orchestrator:
  name: orchestrator
  model: gemini-2.5-flash
  max_features: 7 # decompose goal into at most N features
  description: >
    Understands the user goal, writes the project plan and feature specs,
    assigns feature leads. Never holds full chat history.

feature_lead:
  name: feature_lead
  model: gemini-2.5-flash
  max_tasks_per_feature: 8
  description: >
    Owns one feature end-to-end. Breaks it into task specs and saves
    them under specs/tasks/<feature>/. Each task gets acceptance criteria
    and a context file list.

specialists:
  explorer:
    name: explorer
    model: gemini-2.5-flash
    allowed_tools: [read_file, list_dir, search_code]
    description: Maps the repo, finds relevant files for a task.

  coder:
    name: coder
    model: gemini-2.5-flash
    allowed_tools: [read_file, write_file, apply_patch, search_code]
    description: Implements files from a task spec.

  tester:
    name: tester
    model: gemini-2.5-flash
    allowed_tools: [read_file, run_terminal, run_tests]
    description: Runs tests, reads errors, reports failures.

  reviewer:
    name: reviewer
    model: gemini-2.5-flash
    allowed_tools: [read_file, search_code]
    description: Code review and security scan on completed task output.

workspace:
  base_path: workspace/projects # all file ops sandboxed here
  max_context_files: 5
  max_context_tokens: 15000
  retry_limit: 3

git:
  auto_commit_on_success: true
  commit_message_prefix: "[agent]"
